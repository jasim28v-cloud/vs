<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | NANO ORANGE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;900&display=swap');
        :root { --primary: #ff5500; --nano-glow: rgba(255, 85, 0, 0.6); --v-filter: none; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body, html { background: #000; color: #fff; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; height: 100vh; overflow: hidden; width: 100vw; position: fixed; }

        /* [ADDITION 5] Particle Background Container */
        #particle-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.3; }

        .video-container { height: 100vh; width: 100vw; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; z-index: 1; position: relative; }
        .video-container::-webkit-scrollbar { display: none; }
        .video-scroll-item { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: transparent; display: flex; align-items: center; justify-content: center; }
        
        /* [ADDITION 3] Video Filter Support */
        video { width: 100%; height: 100%; object-fit: cover; filter: var(--v-filter); transition: filter 0.3s ease; }

        .brand-watermark { position: absolute; top: 15%; right: 20px; font-family: 'Orbitron'; font-weight: 900; font-size: 1.5rem; color: rgba(255, 255, 255, 0.15); pointer-events: none; z-index: 10; letter-spacing: 5px; text-transform: uppercase; border-right: 2px solid var(--primary); padding-right: 10px; }

        .top-nav { position: fixed; top: 0; width: 100%; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent); padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .digital-clock { font-family: 'Orbitron'; color: var(--primary); font-size: 14px; text-shadow: 0 0 10px var(--nano-glow); }

        .progress-bar-container { position: fixed; top: 55px; width: 100%; height: 2px; background: rgba(255,255,255,0.1); z-index: 101; }
        #nano-progress { height: 100%; width: 0%; background: var(--primary); box-shadow: 0 0 15px var(--primary); transition: width 0.1s linear; }

        .left-actions { position: absolute; left: 15px; top: 45%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 150; align-items: center; }
        .nano-btn { width: 45px; height: 45px; background: rgba(0,0,0,0.3); backdrop-filter: blur(15px); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; border: 1px solid rgba(255,85,0,0.2); color: #fff; transition: 0.4s; box-shadow: 0 4px 15px rgba(0,0,0,0.5); position: relative; }
        .nano-btn:active { transform: scale(0.9); border-color: var(--primary); }
        .btn-admin { opacity: 0.4; border-style: dashed; font-size: 16px; }

        .video-meta { position: absolute; bottom: 90px; right: 15px; text-align: right; z-index: 50; }
        .nano-hashtag { color: var(--primary); font-weight: 900; font-size: 13px; text-shadow: 0 0 8px var(--nano-glow); letter-spacing: 1px; }

        .nano-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(0,0,0,0.6); backdrop-filter: blur(25px); border-top: 1px solid rgba(255,85,0,0.2); display: flex; justify-content: space-around; align-items: center; z-index: 200; }
        .bar-icon { font-size: 22px; color: rgba(255,255,255,0.4); transition: 0.3s; }
        .bar-icon.active { color: var(--primary); filter: drop-shadow(0 0 8px var(--primary)); }
        .center-up { background: var(--primary); color: #fff; width: 50px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 20px var(--nano-glow); }

        #chat-modal { display: none; position: fixed; bottom: 85px; left: 15px; right: 15px; height: 350px; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); border-radius: 25px; border: 1px solid var(--primary); z-index: 1000; padding: 15px; flex-direction: column; }
        #chat-content { flex: 1; overflow-y: auto; padding-bottom: 10px; }
        .chat-input-area { display: flex; gap: 8px; border-top: 1px solid rgba(255,85,0,0.2); pt-3; }

        #admin-panel { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 2000; padding: 25px; overflow-y: auto; }

        .heart-nano { position: absolute; font-size: 80px; color: var(--primary); pointer-events: none; z-index: 1000; animation: glowFade 0.8s ease-out forwards; }
        @keyframes glowFade { 0% { opacity:0; transform: scale(0.5) rotate(-15deg); filter: blur(5px); } 50% { opacity:1; filter: blur(0); } 100% { opacity:0; transform: scale(1.5) rotate(10deg); } }
    </style>
</head>
<body>

    <canvas id="particle-canvas"></canvas>

    <div class="top-nav">
        <div class="digital-clock" id="nano-clock">00:00:00</div>
        <div class="text-[9px] font-bold text-orange-600 tracking-tighter" id="user-tag">GHOST_USER</div>
    </div>
    <div class="progress-bar-container"><div id="nano-progress"></div></div>

    <div id="admin-panel">
        <div class="flex justify-between items-center mb-8"><h2 class="text-orange-500 font-black italic">NANO ADMIN</h2><i class="fas fa-times text-2xl" onclick="toggleAdmin()"></i></div>
        <div id="admin-list" class="grid grid-cols-2 gap-4"></div>
    </div>

    <div id="chat-modal">
        <div id="chat-content" class="text-[11px] space-y-3 scrollbar-hide"></div>
        <div class="chat-input-area mt-2">
            <input type="text" id="chat-msg" class="flex-1 bg-white/10 rounded-xl px-4 py-2 text-xs border border-orange-900 focus:border-orange-500 text-white" placeholder="أرسل نبضة نانوية...">
            <button onclick="sendMsg()" class="text-orange-500 p-2"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div class="video-container" id="nano-feed"></div>

    <div class="nano-bar">
        <i class="fas fa-home bar-icon active" onclick="location.reload()"></i>
        <div class="center-up" id="btn-up"><i class="fas fa-plus"></i></div>
        <i class="fas fa-comment-dots bar-icon" onclick="toggleChat()"></i>
        <i class="fas fa-share-nodes bar-icon" onclick="realShare()"></i>
    </div>

    <script>
        const MY_ID = localStorage.getItem('shadow_uid') || 'GHOST_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('shadow_uid', MY_ID);
        document.getElementById('user-tag').innerText = MY_ID;

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function realShare() {
            if (navigator.share) {
                navigator.share({ title: 'SHΔDØW NANO', url: window.location.href });
            } else {
                const dummy = document.createElement('input');
                document.body.appendChild(dummy);
                dummy.value = window.location.href;
                dummy.select();
                document.execCommand('copy');
                document.body.removeChild(dummy);
                alert("تم نسخ الرابط!");
            }
        }

        const widget = cloudinary.createUploadWidget({ 
            cloudName: "dssk5tabb", uploadPreset: "bjebvo5p",
            styles: { palette: { window: "#000", windowBorder: "#ff5500", tabIcon: "#ff5500", textLight: "#fff" } }
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos/').push({ url: res.info.secure_url, sender: MY_ID, likes: 0, time: Date.now() });
            }
        });
        document.getElementById("btn-up").onclick = () => widget.open();

        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('nano-feed');
            const adminList = document.getElementById('admin-list');
            const data = snap.val();
            if(!data) return;
            feed.innerHTML = ''; adminList.innerHTML = '';

            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                const item = document.createElement('div');
                item.className = 'video-scroll-item';
                item.innerHTML = `
                    <div class="brand-watermark">SHΔDØW</div>
                    <video loop playsinline src="${v.url}" ontimeupdate="trackProg(this)" onclick="handleVid(event, '${id}')"></video>
                    
                    <div class="left-actions">
                        <div class="nano-btn btn-admin" onclick="toggleAdmin()"><i class="fas fa-shield-halved"></i></div>
                        <div class="nano-btn" onclick="like(event, '${id}')">
                            <i class="fas fa-heart"></i>
                            <span class="absolute -bottom-5 text-[9px] font-bold text-orange-500">${v.likes || 0}</span>
                        </div>
                        <div class="nano-btn" onclick="muteVid(event)"><i class="fas fa-volume-up"></i></div>
                        <div class="nano-btn" onclick="cycleFilter(event)"><i class="fas fa-wand-magic-sparkles"></i></div>
                    </div>

                    <div class="video-meta">
                        <div class="nano-hashtag">#NANO_TECH #SHADOW_PRO #2026</div>
                        <div class="text-[9px] text-white/40 mt-1 uppercase tracking-widest">${v.sender}</div>
                    </div>
                `;
                feed.appendChild(item);

                adminList.innerHTML += `
                    <div class="bg-white/5 p-2 rounded-xl border border-orange-900/30">
                        <video src="${v.url}" class="h-24 w-full object-cover rounded-lg mb-2" muted></video>
                        <button onclick="del('${id}')" class="w-full py-1 text-[10px] font-black bg-orange-600/20 text-orange-500 rounded-lg">REMOVE</button>
                    </div>
                `;
            });
            initObs();
        });

        // [ADDITION 3] Video Filter Logic
        const filters = ['none', 'sepia(0.8) contrast(1.2)', 'grayscale(1) brightness(0.8)', 'hue-rotate(180deg) saturate(2)', 'invert(1) brightness(0.7)'];
        let currentFilterIdx = 0;
        function cycleFilter(e) {
            e.stopPropagation();
            currentFilterIdx = (currentFilterIdx + 1) % filters.length;
            document.documentElement.style.setProperty('--v-filter', filters[currentFilterIdx]);
            
            // Visual feedback on button
            const icon = e.currentTarget.querySelector('i');
            icon.style.color = currentFilterIdx === 0 ? '#fff' : 'var(--primary)';
            icon.style.filter = currentFilterIdx === 0 ? 'none' : 'drop-shadow(0 0 5px var(--primary))';
        }

        function trackProg(v) {
            const container = document.getElementById('nano-feed');
            const rect = v.getBoundingClientRect();
            if (rect.top >= 0 && rect.top < window.innerHeight / 2) {
                document.getElementById('nano-progress').style.width = (v.currentTime / v.duration) * 100 + "%";
            }
        }

        function muteVid(e) {
            e.stopPropagation();
            const btn = e.currentTarget;
            const video = btn.closest('.video-scroll-item').querySelector('video');
            video.muted = !video.muted;
            btn.innerHTML = video.muted ? '<i class="fas fa-volume-mute"></i>' : '<i class="fas fa-volume-up"></i>';
        }

        let lastT = 0;
        function handleVid(e, id) {
            const now = Date.now();
            const video = e.target;
            if(now - lastT < 300) {
                like(null, id);
                const h = document.createElement('i'); h.className = 'fas fa-heart heart-nano';
                h.style.left = e.clientX + 'px'; h.style.top = e.clientY + 'px';
                document.body.appendChild(h); setTimeout(() => h.remove(), 800);
            } else { video.paused ? video.play() : video.pause(); }
            lastT = now;
        }

        function like(e, id) { if(e) e.stopPropagation(); db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function del(id) { if(confirm('حذف نهائي؟')) db.ref(`videos/${id}`).remove(); }
        
        function toggleChat() { 
            const m = document.getElementById('chat-modal'); 
            m.style.display = (m.style.display === 'none' || m.style.display === '') ? 'flex' : 'none'; 
        }

        function toggleAdmin() {
            const p = document.getElementById('admin-panel');
            p.style.display = (p.style.display === 'none' || p.style.display === '') ? 'block' : 'none';
        }

        function sendMsg() {
            const i = document.getElementById('chat-msg');
            if(i.value.trim()) { db.ref('global_chat').push({ u: MY_ID, t: i.value, ts: Date.now() }); i.value = ''; }
        }

        db.ref('global_chat').limitToLast(20).on('value', s => {
            const box = document.getElementById('chat-content'); box.innerHTML = '';
            s.forEach(c => { 
                const m = c.val(); 
                box.innerHTML += `<div class="mb-1"><b class="text-orange-500">${m.u}:</b> <span class="text-gray-300">${m.t}</span></div>`; 
            });
            box.scrollTop = box.scrollHeight;
        });

        function initObs() {
            const obs = new IntersectionObserver((es) => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) {
                        v.play().catch(()=>{});
                    } else {
                        v.pause();
                        v.currentTime = 0;
                    }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-scroll-item').forEach(i => obs.observe(i));
        }

        setInterval(() => {
            const d = new Date();
            document.getElementById('nano-clock').textContent = d.getHours().toString().padStart(2,'0')+":"+d.getMinutes().toString().padStart(2,'0')+":"+d.getSeconds().toString().padStart(2,'0');
        }, 1000);

        document.getElementById('chat-msg').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

        // [ADDITION 5] Particle System Script
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 1.5 + 0.5;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 1 - 0.5;
                this.color = Math.random() > 0.1 ? '#ff5500' : '#fff';
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y > canvas.height) this.y = 0;
                if (this.x > canvas.width || this.x < 0) this.speedX *= -1;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function initParticles() { particles = []; for (let i = 0; i < 50; i++) particles.push(new Particle()); }
        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        initParticles();
        animateParticles();

    </script>
</body>
</html>
