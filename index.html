<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENESIS | ULTRA PLUS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Cairo:wght@300;700&display=swap');
        
        :root { 
            --ultra-pink: #ff007a; 
            --ultra-glow: rgba(255, 0, 122, 0.6);
            --glass-bg: rgba(15, 2, 8, 0.85);
        }
        
        body, html { margin: 0; padding: 0; height: 100%; background: #050002; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }

        /* نظام الألترا بلاس - خلفية ديناميكية */
        .ultra-bg { position: fixed; inset: 0; background: radial-gradient(circle at top right, #250012, #000); z-index: -1; }
        
        /* شاشة التحميل الحديثة */
        #ultra-loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .ultra-spinner { width: 60px; height: 60px; border-radius: 50%; background: conic-gradient(from 0deg, transparent, var(--ultra-pink)); animation: rotate 0.6s linear infinite; position: relative; }
        .ultra-spinner::after { content: ''; position: absolute; inset: 4px; background: #000; border-radius: 50%; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        /* حاوية الفيديوهات */
        .ultra-feed { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .ultra-feed::-webkit-scrollbar { display: none; }
        
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s; }

        /* أيقونات "ألترا بلاس" الحديثة */
        .glass-controls { position: absolute; right: 15px; bottom: 100px; display: flex; flex-direction: column; gap: 15px; z-index: 100; }
        .ultra-icon { 
            width: 58px; height: 58px; border-radius: 20px; 
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 0, 122, 0.3);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.4s; cursor: pointer;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        }
        .ultra-icon i { font-size: 1.5rem; background: linear-gradient(180deg, #fff, var(--ultra-pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 5px var(--ultra-glow)); }
        .ultra-icon:active { transform: scale(0.9) rotate(5deg); border-color: var(--ultra-pink); }
        .stat-text { font-size: 10px; font-weight: bold; margin-top: 2px; font-family: 'Orbitron'; color: var(--ultra-pink); }

        /* البار السفلي الحديث */
        .ultra-nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            width: 90%; max-width: 420px; height: 75px; 
            background: var(--glass-bg); backdrop-filter: blur(25px);
            border-radius: 25px; border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex; justify-content: space-around; align-items: center; z-index: 1000;
        }
        .center-action { 
            width: 65px; height: 65px; background: linear-gradient(45deg, var(--ultra-pink), #ff5e00);
            border-radius: 22px; display: flex; align-items: center; justify-content: center;
            transform: translateY(-20px); box-shadow: 0 15px 35px rgba(255, 0, 122, 0.4);
            border: 5px solid #050002; transition: 0.3s;
        }

        /* لوحة التحكم بالحذف */
        #admin-panel { display: none; position: fixed; inset: 0; z-index: 5000; background: rgba(0,0,0,0.98); padding: 25px; overflow-y: auto; }
        .admin-header { font-family: 'Orbitron'; color: var(--ultra-pink); display: flex; justify-content: space-between; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .thumb-box { position: relative; border-radius: 20px; overflow: hidden; border: 1px solid #333; height: 220px; transition: 0.3s; }
        .thumb-box:hover { border-color: var(--ultra-pink); }
        .delete-btn { position: absolute; top: 10px; right: 10px; background: var(--ultra-pink); color: #fff; width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }

    </style>
</head>
<body>

    <div id="ultra-loader">
        <div class="ultra-spinner"></div>
        <div class="absolute mt-32 font-[Orbitron] text-xs tracking-[5px] text-pink-600 animate-pulse">ULTRA PLUS ACTIVATED</div>
    </div>

    <div class="ultra-bg"></div>

    <header class="fixed top-0 w-full z-[500] p-6 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-2 h-2 rounded-full bg-pink-500 animate-ping"></div>
            <span class="font-[Orbitron] font-black text-xl tracking-tighter">GENESIS <span class="text-pink-500">+</span></span>
        </div>
        <div class="ultra-icon w-10 h-10" onclick="toggleAdmin()">
            <i class="fas fa-shapes text-xs"></i>
        </div>
    </header>

    <main class="ultra-feed" id="main-feed">
        <div class="h-full flex items-center justify-center opacity-30 italic">جاري تحميل التغذية البصرية...</div>
    </main>

    <nav class="ultra-nav">
        <div class="flex flex-col items-center opacity-40"><i class="fas fa-home text-xl"></i></div>
        <div class="flex flex-col items-center opacity-40"><i class="fas fa-search text-xl"></i></div>
        <div class="center-action" id="upload-trigger"><i class="fas fa-plus text-white text-2xl"></i></div>
        <div class="flex flex-col items-center opacity-40"><i class="fas fa-comment-alt text-xl"></i></div>
        <div class="flex flex-col items-center opacity-40"><i class="fas fa-user-circle text-xl"></i></div>
    </nav>

    <div id="admin-panel">
        <div class="admin-header">
            <h2 class="text-xl font-black">SYSTEM_ADMIN</h2>
            <i class="fas fa-times-circle text-2xl" onclick="toggleAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 gap-4 pb-32"></div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // إخفاء التحميل
        window.onload = () => { setTimeout(() => { document.getElementById('ultra-loader').style.opacity = '0'; setTimeout(() => document.getElementById('ultra-loader').remove(), 800); }, 2000); };

        db.ref('videos').on('value', (snap) => {
            const feed = document.getElementById('main-feed');
            const grid = document.getElementById('admin-grid');
            const data = snap.val();
            
            if(!data) {
                feed.innerHTML = '<div class="h-full flex items-center justify-center text-pink-900 font-bold">ارفع أول فيديو لتفعيل النظام</div>';
                return;
            }

            let fHtml = ''; let gHtml = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                fHtml += `
                    <div class="video-card">
                        <video loop playsinline src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                        <div class="glass-controls">
                            <div class="ultra-icon" onclick="like('${id}')"><i class="fas fa-heart"></i><span class="stat-text">${v.likes || 0}</span></div>
                            <div class="ultra-icon" onclick="share()"><i class="fas fa-share-nodes"></i></div>
                            <div class="ultra-icon" onclick="window.open('https://google.com')"><i class="fas fa-fire-burner text-yellow-500"></i></div>
                        </div>
                    </div>`;
                gHtml += `
                    <div class="thumb-box">
                        <video src="${v.url}#t=1" muted></video>
                        <button class="delete-btn" onclick="deleteVideo('${id}')"><i class="fas fa-trash-alt"></i></button>
                    </div>`;
            });
            feed.innerHTML = fHtml;
            grid.innerHTML = gHtml;
            setupObserver();
        });

        function setupObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => {
                    const vid = e.target.querySelector('video');
                    if(e.isIntersecting) vid?.play().catch(()=>{});
                    else vid?.pause();
                });
            }, { threshold: 0.7 });
            document.querySelectorAll('.video-card').forEach(c => observer.observe(c));
        }

        function toggleAdmin() { 
            const p = document.getElementById('admin-panel');
            p.style.display = p.style.display === 'block' ? 'none' : 'block';
        }

        function like(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); }
        function deleteVideo(id) { if(confirm('تأكيد الحذف من النظام؟')) db.ref(`videos/${id}`).remove(); }
        function share() { if(navigator.share) navigator.share({url: window.location.href}); }

        const widget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") { db.ref('videos/').push({ url: res.info.secure_url, likes: 0 }); }
        });
        document.getElementById("upload-trigger").onclick = () => widget.open();

    </script>
</body>
</html>
