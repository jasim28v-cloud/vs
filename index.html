<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOX_GOD | FIXED</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon: #ff0055; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .feed-container { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .feed-container::-webkit-scrollbar { display: none; }
        .video-card { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .interaction-bar { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-btn { display: flex; flex-direction: column; align-items: center; gap: 5px; cursor: pointer; }
        .icon-circle { width: 50px; height: 50px; background: rgba(0,0,0,0.6); border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(255,255,255,0.2); backdrop-filter: blur(10px); }
        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; height: 65px; background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(20px); border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 200; border: 1px solid rgba(255,255,255,0.1); }
        .main-plus { width: 55px; height: 55px; background: var(--neon); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-top: -35px; box-shadow: 0 0 20px var(--neon); border: 4px solid #000; cursor: pointer; }
        #chat-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 500; display: none; flex-direction: column; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full p-5 z-[150] flex justify-between items-center">
        <div class="bg-black/40 px-4 py-1 rounded-full border border-white/10 font-[Orbitron] text-xs" id="logo">VOX_GOD.AI</div>
        <i class="fas fa-ghost opacity-40" onclick="toggleAdmin()"></i>
    </header>

    <main class="feed-container" id="video-feed"></main>

    <nav class="bottom-nav">
        <i class="fas fa-user-circle text-xl opacity-60" onclick="handleAdClick()"></i>
        <i class="fas fa-at text-xl opacity-60" onclick="handleAdClick()"></i>
        <div class="main-plus" id="upload-trigger"><i class="fas fa-plus text-white text-2xl"></i></div>
        <i class="fas fa-bolt text-xl opacity-60" onclick="handleAdClick()"></i>
        <i class="fas fa-share-alt text-xl opacity-60" onclick="handleAdClick()"></i>
    </nav>

    <div id="chat-panel">
        <div class="p-6 flex justify-between border-b border-white/10">
            <h2 class="font-[Orbitron] text-pink-500">COMMS_CENTER</h2>
            <i class="fas fa-times text-2xl" onclick="closeChat()"></i>
        </div>
        <div id="chat-stream" class="flex-1 overflow-y-auto p-4 space-y-4"></div>
        <div class="p-4 bg-white/5 flex gap-2">
            <input type="text" id="msg-input" class="flex-1 bg-black/50 border border-white/20 rounded-xl p-3 outline-none" placeholder="Enter message...">
            <button onclick="sendMsg()" class="bg-pink-600 px-4 rounded-xl"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <script>
        const FB_URL = "https://xkom-a73e4-default-rtdb.firebaseio.com/";
        const CLOUD_NAME = "dqzjfaqg4";
        const AD_LINKS = [
            "https://www.effectivegatecpm.com/q7bf96ad4p?key=4272e67963ce67f1cfaeb4a56682d6ec",
            "https://www.effectivegatecpm.com/w6ejwgptb?key=b77b52a8f4f7e4cdd1ac7bccc1b04a4d"
        ];

        firebase.initializeApp({ databaseURL: FB_URL });
        const db = firebase.database();

        function handleAdClick() {
            window.open(AD_LINKS[Math.floor(Math.random() * AD_LINKS.length)], '_blank');
        }

        db.ref('videos').on('value', snap => {
            const feed = document.getElementById('video-feed');
            const data = snap.val();
            if(!data) return;
            let html = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                html += `
                <section class="video-card">
                    <video loop playsinline src="${v.url}" onclick="this.paused?this.play():this.pause()"></video>
                    <div class="interaction-bar">
                        <div class="icon-btn" onclick="like('${id}')">
                            <div class="icon-circle"><i class="fas fa-heart text-pink-500"></i></div>
                            <span class="count-label">${v.likes || 0}</span>
                        </div>
                        <div class="icon-btn" onclick="openChat()">
                            <div class="icon-circle"><i class="fas fa-comment text-white"></i></div>
                        </div>
                        <div class="icon-btn" onclick="handleAdClick()">
                            <div class="icon-circle"><i class="fas fa-share text-cyan-400"></i></div>
                        </div>
                    </div>
                </section>`;
            });
            feed.innerHTML = html;
            initObserver();
        });

        const uploader = cloudinary.createUploadWidget({
            cloudName: CLOUD_NAME,
            uploadPreset: "ml_default"
        }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos').push({ url: res.info.secure_url, likes: 0, time: Date.now() });
                alert("تم الرفع!");
            }
        });

        document.getElementById('upload-trigger').onclick = () => uploader.open();

        function like(id) { handleAdClick(); db.ref(`videos/${id}/likes`).transaction(c => (c || 0) + 1); }
        function openChat() { handleAdClick(); document.getElementById('chat-panel').style.display = 'flex'; }
        function closeChat() { document.getElementById('chat-panel').style.display = 'none'; }

        function initObserver() {
            const obs = new IntersectionObserver(entries => {
                entries.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v?.play().catch(()=>{});
                    else v?.pause();
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-card').forEach(s => obs.observe(s));
        }

        function toggleAdmin() {
            const p = prompt("ADMIN_KEY:");
            if(p === "1234") { if(confirm("مسح الكل؟")) db.ref('videos').remove(); }
        }
    </script>
</body>
</html>
