<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SHΔDØW | GENESIS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        :root { --neon-color: #00f3ff; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .glass-ui { background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-text { color: var(--neon-color); text-shadow: 0 0 10px var(--neon-color); }
        .side-controls { position: absolute; left: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; z-index: 50; }
        .admin-panel { position: fixed; inset: 0; z-index: 500; background: #050505; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-card { background: #111; border: 1px solid #222; padding: 10px; border-radius: 10px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header class="fixed top-0 w-full z-[200] glass-ui p-4 flex justify-between items-center">
        <h1 class="text-xl font-black font-[Orbitron] neon-text">SHΔDØW</h1>
        <div class="flex gap-4">
            <i class="fas fa-user-shield opacity-30 hover:opacity-100 cursor-pointer transition-opacity" onclick="checkAdminAuth()"></i>
        </div>
    </header>

    <main class="scroll-engine" id="video-stack"></main>

    <nav class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[90%] max-w-[400px] h-16 glass-ui rounded-2xl flex justify-around items-center z-[200]">
        <i class="fas fa-home neon-text" onclick="location.reload()"></i>
        <i class="fas fa-comment-dots" onclick="toggleChat()"></i>
        <div id="upload-trigger" class="w-12 h-12 bg-white text-black rounded-xl flex items-center justify-center shadow-lg active:scale-90 transition-transform"><i class="fas fa-plus"></i></div>
        <i class="fas fa-random" onclick="shuffleVideo()"></i>
    </nav>

    <div id="chat-overlay" class="fixed inset-0 z-[300] hidden flex-col glass-ui">
        <div class="p-4 flex justify-between border-b border-white/10">
            <span class="neon-text font-[Orbitron]">CORE_CHAT</span>
            <i class="fas fa-times cursor-pointer" onclick="toggleChat()"></i>
        </div>
        <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-3 flex flex-col"></div>
        <div class="p-4 flex gap-2 border-t border-white/10">
            <input type="text" id="msg-input" class="flex-1 bg-white/5 border border-white/10 rounded-lg p-3 outline-none" placeholder="اكتب رسالتك..." onkeypress="if(event.key==='Enter') sendChat()">
            <button onclick="sendChat()" class="neon-text px-3"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="admin-overlay" class="admin-panel">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold neon-text">CONTROL_CENTER</h2>
            <button onclick="toggleAdmin()" class="bg-red-500/20 text-red-500 px-4 py-1 rounded">خروج</button>
        </div>
        <div id="admin-list"></div>
    </div>

    <script>
        const ADMIN_PASS = "1234"; 
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'USER_' + Math.random().toString(36).substr(2, 5).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('video-stack');
            const adminList = document.getElementById('admin-list');
            const data = snapshot.val();
            container.innerHTML = '';
            adminList.innerHTML = '';
            if(!data) return;

            Object.keys(data).reverse().forEach(id => {
                const vid = data[id];
                const section = document.createElement('section');
                section.className = 'video-segment';
                section.innerHTML = `
                    <video loop playsinline src="${vid.url}" onclick="this.paused ? this.play() : this.pause()"></video>
                    <div class="side-controls">
                        <div class="flex flex-col items-center gap-1" onclick="toggleLike('${id}')">
                            <i class="fas fa-heart text-2xl ${vid.likedBy && vid.likedBy[SHADOW_ID] ? 'text-red-500' : ''}"></i>
                            <span class="text-xs">${vid.likes || 0}</span>
                        </div>
                    </div>
                `;
                container.appendChild(section);

                const card = document.createElement('div');
                card.className = 'admin-card';
                card.innerHTML = `
                    <video class="w-16 h-16 object-cover rounded" src="${vid.url}"></video>
                    <div class="flex-1"><div class="text-[10px] text-gray-500">${id}</div></div>
                    <button onclick="deleteVideo('${id}')" class="text-red-500 p-3"><i class="fas fa-trash-alt"></i></button>
                `;
                adminList.appendChild(card);
            });
            initScroll();
        });

        const myWidget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") {
                db.ref('videos').push({ url: res.info.secure_url, sender: SHADOW_ID, likes: 0, timestamp: Date.now() });
            }
        });
        document.getElementById("upload-trigger").onclick = () => myWidget.open();

        function sendChat() {
            const input = document.getElementById('msg-input');
            if(input.value.trim()) {
                db.ref('global_chat').push({ user: SHADOW_ID, text: input.value, time: Date.now() });
                input.value = '';
            }
        }

        db.ref('global_chat').limitToLast(30).on('value', s => {
            const box = document.getElementById('chat-box');
            box.innerHTML = '';
            if(s.val()) {
                Object.values(s.val()).forEach(m => {
                    const div = document.createElement('div');
                    const isMe = m.user === SHADOW_ID;
                    div.className = `p-2 rounded-lg max-w-[80%] ${isMe ? 'bg-cyan-600 self-end' : 'bg-white/10 self-start'}`;
                    div.innerHTML = `<span class="text-[8px] block opacity-50">${m.user}</span>${m.text}`;
                    box.appendChild(div);
                });
                box.scrollTop = box.scrollHeight;
            }
        });

        function checkAdminAuth() {
            const pass = prompt("أدخل رمز الوصول الخاص بالمدير:");
            if (pass === ADMIN_PASS) { toggleAdmin(); } 
            else if (pass !== null) { alert("خطأ: ليس لديك صلاحية الدخول."); }
        }

        function deleteVideo(id) { if(confirm('هل أنت متأكد من حذف هذا الفيديو نهائياً؟')) db.ref(`videos/${id}`).remove(); }
        function toggleAdmin() { const a = document.getElementById('admin-overlay'); a.style.display = a.style.display === 'flex' ? 'none' : 'flex'; }
        function toggleChat() { const c = document.getElementById('chat-overlay'); c.classList.toggle('hidden'); c.classList.toggle('flex'); }
        function shuffleVideo() {
            const s = document.querySelectorAll('.video-segment');
            if(s.length) s[Math.floor(Math.random()*s.length)].scrollIntoView({behavior:'smooth'});
        }

        function initScroll() {
            const obs = new IntersectionObserver(es => {
                es.forEach(e => {
                    const v = e.target.querySelector('video');
                    if(e.isIntersecting) v.play().catch(()=>{});
                    else { v.pause(); v.currentTime = 0; }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(s => obs.observe(s));
        }

        function toggleLike(id) {
            db.ref(`videos/${id}`).transaction(p => {
                if(p) {
                    p.likedBy = p.likedBy || {};
                    if(p.likedBy[SHADOW_ID]) { p.likes--; delete p.likedBy[SHADOW_ID]; }
                    else { p.likes++; p.likedBy[SHADOW_ID] = true; }
                }
                return p;
            });
        }
        document.addEventListener('touchstart', () => { document.querySelectorAll('video').forEach(v => v.muted = false); }, { once: true });
    </script>
</body>
</html>
