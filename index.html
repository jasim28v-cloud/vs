<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GENESIS | PINK GLASS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@500;900&family=Cairo:wght@400;700&display=swap');
        
        :root { --pink-glow: #ff2d55; }
        
        body, html { margin: 0; padding: 0; height: 100%; background: radial-gradient(circle at center, #2d0a15 0%, #000000 100%); color: #fff; overflow: hidden; font-family: 'Cairo', sans-serif; }
        
        /* شاشة تحميل سريعة */
        #preloader { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .loader { width: 40px; height: 40px; border: 3px solid #ff2d5533; border-top: 3px solid var(--pink-glow); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .scroll-engine { height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; position: relative; z-index: 10; }
        .scroll-engine::-webkit-scrollbar { display: none; }
        
        .video-segment { height: 100vh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: center; justify-content: center; }
        video { width: 100%; height: 100%; object-fit: cover; background: #000; }

        /* واجهة وردية زجاجية */
        .glass-ui { background: rgba(255, 45, 85, 0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        .middle-controls { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 100; }
        .icon-box { width: 50px; height: 50px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 45, 85, 0.3); color: #fff; transition: 0.2s; }
        .icon-box i { filter: drop-shadow(0 0 5px var(--pink-glow)); }

        .pro-watermark { position: absolute; top: 100px; right: 20px; font-family: 'Orbitron'; font-size: 10px; color: var(--pink-glow); border: 1px solid var(--pink-glow); padding: 4px 10px; border-radius: 20px; background: rgba(0,0,0,0.4); pointer-events: none; }

        .bottom-nav { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; height: 65px; border-radius: 30px; display: flex; justify-content: space-around; align-items: center; z-index: 500; }
        .upload-btn { width: 50px; height: 50px; background: var(--pink-glow); color: #fff; border-radius: 15px; display: flex; align-items: center; justify-content: center; transform: translateY(-10px); box-shadow: 0 5px 15px rgba(255, 45, 85, 0.4); }

        /* لوحة تحكم سريعة */
        #admin-overlay { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); padding: 20px; overflow-y: auto; }
        .admin-card { background: rgba(255, 255, 255, 0.05); border-radius: 15px; overflow: hidden; border: 1px solid rgba(255, 45, 85, 0.2); position: relative; height: 160px; }
        .admin-card video { width: 100%; height: 100%; object-fit: cover; pointer-events: none; }
    </style>
</head>
<body>

    <div id="preloader"><div class="loader"></div></div>

    <header class="fixed top-0 w-full z-[200] glass-ui p-4 flex justify-between items-center rounded-b-2xl">
        <div class="font-[Orbitron] text-lg text-white" id="clock-display">00:00:00</div>
        <div class="text-[9px] font-[Orbitron] text-[#ff2d55] tracking-[2px]">GENESIS_PINK</div>
    </header>

    <div class="scroll-engine" id="video-stack"></div>

    <nav class="bottom-nav glass-ui">
        <div onclick="location.reload()"><i class="fas fa-home opacity-50"></i></div>
        <div onclick="toggleChat()"><i class="fas fa-comment opacity-50"></i></div>
        <div id="upload-trigger" class="upload-btn"><i class="fas fa-plus text-xl"></i></div>
        <div onclick="toggleAdmin()"><i class="fas fa-cog opacity-50"></i></div>
        <div onclick="shareApp()"><i class="fas fa-share-alt opacity-50"></i></div>
    </nav>

    <div id="admin-overlay">
        <div class="flex justify-between items-center mb-6 sticky top-0 bg-black/50 p-3 rounded-xl z-50">
            <h2 class="font-[Orbitron] text-[#ff2d55]">ADMIN_CORE</h2>
            <i class="fas fa-times text-2xl" onclick="toggleAdmin()"></i>
        </div>
        <div id="admin-grid" class="grid grid-cols-2 gap-3 pb-32"></div>
    </div>

    <div id="chat-overlay" class="fixed inset-0 z-[1000] glass-ui hidden flex-col p-6">
        <div class="flex justify-between items-center mb-4"><span class="font-[Orbitron]">CHAT</span><i class="fas fa-times" onclick="toggleChat()"></i></div>
        <div id="chat-box" class="flex-1 overflow-y-auto space-y-3"></div>
        <div class="flex gap-2 mt-4 mb-20">
            <input type="text" id="msg-input" class="flex-1 bg-white/5 p-3 rounded-xl outline-none border border-white/10" placeholder="رسالة...">
            <button onclick="sendChat()" class="text-[#ff2d55] px-2"><i class="fas fa-paper-plane text-xl"></i></button>
        </div>
    </div>

    <script>
        const SHADOW_ID = localStorage.getItem('shadow_uid') || 'P_' + Math.random().toString(36).substr(2, 4).toUpperCase();
        localStorage.setItem('shadow_uid', SHADOW_ID);

        const firebaseConfig = { databaseURL: "https://project-717e4-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const AD_LINKS = ["https://www.effectivegatecpm.com/bxwxuk2f39?key=566216691dc8b76a740840e94f68f44c", "https://www.effectivegatecpm.com/k60w64w4gk?key=564f3d8cc4ac85949f218179b742495e"];
        let adIdx = 0;
        function openAd() { window.open(AD_LINKS[adIdx], '_blank'); adIdx = (adIdx + 1) % AD_LINKS.length; }

        function updateClock() { document.getElementById('clock-display').textContent = new Date().toLocaleTimeString('en-GB'); }
        setInterval(updateClock, 1000);

        window.onload = () => { setTimeout(() => { document.getElementById('preloader').style.display = 'none'; }, 1000); };

        db.ref('videos').on('value', (snapshot) => {
            const container = document.getElementById('video-stack');
            const adminGrid = document.getElementById('admin-grid');
            const data = snapshot.val();
            if(!data) return;

            let vHtml = ''; let aHtml = '';
            Object.keys(data).reverse().forEach(id => {
                const v = data[id];
                vHtml += `
                    <section class="video-segment">
                        <div class="video-container h-full w-full relative">
                            <div class="pro-watermark">GENESIS PRO</div>
                            <video loop playsinline preload="auto" src="${v.url}" onclick="handleTap(event, '${id}')"></video>
                            <div class="middle-controls">
                                <div class="flex flex-col items-center" onclick="like('${id}')">
                                    <div class="icon-box"><i class="fas fa-heart ${v.likedBy && v.likedBy[SHADOW_ID] ? 'text-red-500' : ''}"></i></div>
                                    <span class="text-[10px] mt-1 font-bold">${v.likes || 0}</span>
                                </div>
                                <div class="icon-box" onclick="openAd()"><i class="fas fa-share-nodes"></i></div>
                                <div class="icon-box" onclick="mute(this)"><i class="fas fa-volume-up"></i></div>
                            </div>
                        </div>
                    </section>`;
                aHtml += `
                    <div class="admin-card">
                        <video src="${v.url}#t=0.5" muted preload="metadata"></video>
                        <button onclick="deleteVid('${id}')" class="absolute top-2 right-2 bg-red-600 w-8 h-8 rounded-full flex items-center justify-center border border-white/20"><i class="fas fa-trash text-xs"></i></button>
                    </div>`;
            });
            container.innerHTML = vHtml; adminGrid.innerHTML = aHtml;
            initObserver();
        });

        function handleTap(e, id) {
            const v = e.target;
            v.paused ? v.play() : v.pause();
        }

        function like(id) { db.ref(`videos/${id}/likes`).transaction(l => (l || 0) + 1); db.ref(`videos/${id}/likedBy/${SHADOW_ID}`).set(true); }
        function mute(btn) { openAd(); const v = btn.closest('.video-container').querySelector('video'); v.muted = !v.muted; btn.innerHTML = v.muted ? '<i class="fas fa-volume-mute text-red-500"></i>' : '<i class="fas fa-volume-up"></i>'; }
        function toggleAdmin() { const a = document.getElementById('admin-overlay'); a.style.display = a.style.display === 'block' ? 'none' : 'block'; }
        function toggleChat() { document.getElementById('chat-overlay').classList.toggle('hidden'); document.getElementById('chat-overlay').classList.toggle('flex'); }
        function deleteVid(id) { if(confirm('حذف؟')) db.ref(`videos/${id}`).remove(); }

        const widget = cloudinary.createUploadWidget({ cloudName: "dssk5tabb", uploadPreset: "bjebvo5p" }, (err, res) => {
            if (!err && res.event === "success") { db.ref('videos/').push({ url: res.info.secure_url, likes: 0 }); }
        });
        document.getElementById("upload-trigger").onclick = () => widget.open();

        function initObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    const video = entry.target.querySelector('video');
                    if (entry.isIntersecting) { video && video.play().catch(()=>{}); }
                    else { video && video.pause(); }
                });
            }, { threshold: 0.6 });
            document.querySelectorAll('.video-segment').forEach(seg => observer.observe(seg));
        }
    </script>
</body>
</html>
